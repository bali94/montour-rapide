<div class="min-h-screen bg-gray-100 flex flex-col items-center p-4">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-4xl">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Gestion des Agents</h1>

    <div class="mb-8">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Agents Existants ({{ agents().length }}):</h2>
      <div *ngIf="agents().length === 0" class="p-4 bg-gray-50 rounded-md text-center text-gray-500 italic">
        Aucun agent trouvé.
      </div>
      <div *ngIf="agents().length > 0" class="space-y-4">
        <div *ngFor="let agent of agents()" class="bg-gray-50 p-4 rounded-lg shadow border border-gray-200 flex items-center justify-between">
          <div>
            <p class="text-lg font-bold text-gray-800">{{ agent.email }}</p>
            <p class="text-sm text-gray-600">ID: {{ agent.uid }}</p>
            <p class="text-sm text-gray-600">Rôle: <span class="font-semibold">{{ agent.role }}</span></p>
            <p class="text-sm text-gray-600">Compagnie Actuelle: <span class="font-semibold">{{ getCompanyName(selectedCompanyIds().get(agent.uid)) }}</span></p>
          </div>
          <div class="flex items-center space-x-4">
            <select
              [ngModel]="selectedCompanyIds().get(agent.uid)"
              (ngModelChange)="onCompanySelected(agent.uid, $event)"
              class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            >
              <option value="">-- Aucune Compagnie --</option>
              <option *ngFor="let company of companies()" [value]="company.id">{{ company.name }}</option>
            </select>
            <button
              (click)="updateAgentCompany(agent)"
              class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out"
            >
              Mettre à jour
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
