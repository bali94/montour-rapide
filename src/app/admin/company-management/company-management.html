<div class="min-h-screen bg-gray-100 flex flex-col items-center p-4">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Gestion des Compagnies</h1>

    <!-- Create New Company Form -->
    <div class="mb-8 p-6 bg-blue-50 border-l-4 border-blue-500 rounded-lg shadow-sm">
      <h2 class="text-xl font-semibold text-blue-800 mb-4">Créer une Nouvelle Compagnie</h2>
      <form (ngSubmit)="createNewCompany()" class="space-y-4">
        <div>
          <label for="newCompanyName" class="block text-gray-700 text-sm font-bold mb-2">Nom de la Compagnie:</label>
          <input
            type="text"
            id="newCompanyName"
            [(ngModel)]="newCompanyName"
            name="newCompanyName"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            placeholder="Ex: Banque Alpha, Supermarché Beta"
            required
          />
        </div>
        <div>
          <label for="newCompanyDescription" class="block text-gray-700 text-sm font-bold mb-2">Description (optionnel):</label>
          <textarea
            id="newCompanyDescription"
            [(ngModel)]="newCompanyDescription"
            name="newCompanyDescription"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
            placeholder="Description de la compagnie"
            rows="3"
          ></textarea>
        </div>
        <button
          type="submit"
          class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out"
        >
          Créer la Compagnie
        </button>
      </form>
    </div>

    <!-- Existing Companies List -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold text-gray-700 mb-4">Compagnies Existantes ({{ companies().length }}):</h2>
      <div *ngIf="companies().length === 0" class="p-4 bg-gray-50 rounded-md text-center text-gray-500 italic">
        Aucune compagnie créée pour le moment.
      </div>
      <div *ngIf="companies().length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div *ngFor="let company of companies()" class="bg-white p-5 rounded-lg shadow border border-gray-200">
          <h3 class="text-lg font-bold text-gray-800 mb-2">{{ company.name }} (ID: {{ company.id }})</h3>
          <p *ngIf="company.description" class="text-gray-600 mb-3">Description: {{ company.description }}</p>

          <div class="mt-4 text-center">
            <h4 class="text-md font-semibold text-gray-700 mb-2">QR Code pour Client</h4>
            <qrcode [qrdata]="getCompanyQRCodeUrl(company.id)" [width]="150" [errorCorrectionLevel]="'M'"></qrcode>
            <p class="text-sm text-gray-500 mt-2 break-all">{{ getCompanyQRCodeUrl(company.id) }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
